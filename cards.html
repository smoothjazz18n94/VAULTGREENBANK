<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cards & Accounts — VaultGreen Bank</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="cards.css"/>
</head>

<body>

<div class="noise-layer"></div>

<!-- ───── NAV ───── -->
<nav class="top-nav">
  <a href="dashboard.html" class="nav-back">← Dashboard</a>

  <div class="nav-brand">
    <span>◈</span> VaultGreen
  </div>

  <div class="nav-actions">
    <div class="nav-avatar" id="navAvatar">VG</div>
  </div>
</nav>

<!-- ───── HEADER ───── -->
<header class="page-header">
  <div class="page-header-inner">

    <div>
      <p class="page-eyebrow">Financial Tools</p>
      <h1 class="page-title">Cards & Accounts</h1>
      <p class="page-sub">Manage your virtual cards and accounts.</p>
    </div>

    <!-- KYC STATUS ONLY (NO UI SYSTEM) -->
    <div class="kyc-status-badge">
      <span class="kyc-dot" id="kycDot"></span>
      <span id="kycLabel">Checking status...</span>
    </div>

  </div>
</header>

<!-- ───── TABS ───── -->
<div class="tab-bar">

  <button class="tab active" onclick="switchTab('cards', this)">
    My Cards
  </button>

  <button class="tab" onclick="switchTab('accounts', this)">
    Virtual Accounts
  </button>

</div>

<!-- ───── CARDS ───── -->
<section class="tab-panel" id="panel-cards">

  <div class="panel-inner">

    <!-- CARDS AREA -->
    <div class="card-stage" id="cardStage">

      <div class="card-empty-state" id="cardEmpty" hidden>
        <p>No cards yet</p>
        <span>Create your first card</span>
      </div>

    </div>

    <!-- ACTIONS -->
    <div class="action-row">

      <button class="action-btn primary" id="createCardBtn" onclick="createCard()">
        Generate New Card
      </button>

      <button class="action-btn ghost" onclick="revealCvv()">
        Show CVV
      </button>

    </div>

  </div>

</section>

<!-- ───── ACCOUNTS ───── -->
<section class="tab-panel hidden" id="panel-accounts">

  <div class="panel-inner">

    <div class="va-create-form" id="vaCreateForm">

      <input type="text" id="vaName" placeholder="Account name..." maxlength="30"/>

      <button onclick="createVirtualAccount()">
        Create Account
      </button>

    </div>

    <div class="va-grid" id="vaGrid">

      <div class="va-empty" id="vaEmpty" hidden>
        <p>No accounts yet</p>
      </div>

    </div>

  </div>

</section>

<!-- ───── CVV MODAL ───── -->
<div class="modal-overlay" id="cvvModal">
  <div class="modal-box">

    <button onclick="closeModal('cvvModal')">✕</button>

    <h3>CVV Security</h3>
    <p>Never share this code</p>

    <div class="cvv-display" id="cvvDisplay">•••</div>

  </div>
</div>

<!-- ───── SCRIPT ───── -->
<script src="cards.js"></script>

</body>
</html>
